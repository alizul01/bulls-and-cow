services:
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - server
    networks:
      default:
        aliases:
          - bulls-and-cow-frontend

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    networks:
      default:
        aliases:
          - bulls-and-cow-server

  caddy:
    image: caddy:2
    profiles:
      - standalone
    restart: unless-stopped
    depends_on:
      - frontend
      - server
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
